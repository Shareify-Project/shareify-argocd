apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shareify-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shareify-Project/shareify-argocd.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
