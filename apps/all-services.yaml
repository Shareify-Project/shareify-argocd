apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shareify-Project/shareify-user-service.git
    targetRevision: main
    path: charts/user-service
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: shareify
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
